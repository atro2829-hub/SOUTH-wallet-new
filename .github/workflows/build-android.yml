name: Build Android Apps

on:
  push:
    branches: [main]
    paths-ignore:
      - '.gitignore'
      - 'README.md'
      - 'docs/'
      - 'skills/'
      - 'agent-ctx/'
      - '.zscripts/'
      - 'examples/'
      - 'e2e/'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Which apps to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - user
          - admin

env:
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  KEYSTORE_FILE: 'south-wallet.keystore'
  KEYSTORE_PASSWORD: 'southwallet123'
  KEY_ALIAS: 'southwallet'
  KEY_PASSWORD: 'southwallet123'

jobs:
  # ──────────────────────────────────────────────────────────────
  #  USER WALLET (com.qtbm.south)
  # ──────────────────────────────────────────────────────────────
  build-user-app:
    name: "📱 Build User Wallet (com.qtbm.south)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'user' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js 22
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version
          node --version | grep -q v22 || { echo "ERROR: Node 22 required but got $(node --version)"; exit 1; }

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" || true
          sdkmanager --install "platform-tools" || true

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Remove ALL API routes (incompatible with static export)
        run: rm -rf src/app/api || true

      - name: Build Next.js static export
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: https://kifmxseonkdsxuanznny.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZm14c2Vvbmtkc3h1YW56bm55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Njk3NzAsImV4cCI6MjA5NzA0NTc3MH0.4KbBtMruP_xrPiHe_XtcoHG7NVQhlflhUUkJFWgQxkM
          NEXT_PUBLIC_G2BULK_API_KEY: 4882984fe50f9038432b21e5fb37ecbf38a029c40a45c73f27da374ac933bd45
          NEXT_PUBLIC_G2BULK_BASE_URL: https://api.g2bulk.com
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBY9UTcryFEoq8VA1zD7OVnku-fjLxw-p4
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: southern-portfolio.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: https://southern-portfolio-default-rtdb.firebaseio.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: southern-portfolio
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: southern-portfolio.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 501045825605
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:501045825605:android:a0b11c5db57c9831d3932c

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../${{ env.KEYSTORE_FILE }} \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ env.KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ env.KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ env.KEY_PASSWORD }} \
            --stacktrace

      - name: Upload User Wallet Release APK
        uses: actions/upload-artifact@v4
        with:
          name: south-wallet-user-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  #  ADMIN APP (com.qtbm.south.admin)
  # ──────────────────────────────────────────────────────────────
  build-admin-app:
    name: "🛡️ Build Admin App (com.qtbm.south.admin)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'admin' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js 22
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version
          node --version | grep -q v22 || { echo "ERROR: Node 22 required but got $(node --version)"; exit 1; }

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" || true
          sdkmanager --install "platform-tools" || true

      - name: Install npm dependencies
        working-directory: south-admin
        run: npm ci --legacy-peer-deps

      - name: Build Next.js static export
        working-directory: south-admin
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1

      - name: Sync Capacitor Android
        working-directory: south-admin
        run: npx cap sync android

      - name: Build Release APK
        working-directory: south-admin/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../../../${{ env.KEYSTORE_FILE }} \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ env.KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ env.KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ env.KEY_PASSWORD }} \
            --stacktrace

      - name: Upload Admin App Release APK
        uses: actions/upload-artifact@v4
        with:
          name: south-wallet-admin-release
          path: south-admin/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
